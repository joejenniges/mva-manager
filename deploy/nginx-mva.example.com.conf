# Example Nginx reverse proxy for mva-manager.
# Replace mva.example.com with your own domain and point the certs at your
# Let's Encrypt live directory before using.

server {
    listen 80;
    server_name mva.example.com;

    # Let's Encrypt challenge must be served before redirect exists
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name mva.example.com;

    ssl_certificate /etc/letsencrypt/live/mva.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mva.example.com/privkey.pem;

    # File uploads (documents, etc.)
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
