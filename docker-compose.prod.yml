services:
  app:
    build: .
    container_name: mva-app
    ports:
      - "3100:3100"
    volumes:
      - uploads_data:/app/uploads
    environment:
      NODE_ENV: production
      PORT: 3100
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/mva-manager
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      ALLOWED_EMAILS: ${ALLOWED_EMAILS}
      OSRM_URL: http://osrm:5000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:17
    container_name: mva-postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: mva-manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  osrm:
    image: osrm/osrm-backend:latest
    container_name: mva-osrm
    volumes:
      - osrm_data:/data
    command: osrm-routed --algorithm mld /data/region.osrm
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  uploads_data:
  osrm_data:
