services:
  app:
    build:
      context: .
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
        VITE_COMMIT_HASH: ${COMMIT_HASH}
    container_name: mva-app
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - /mnt/yto-c528effc6f9d49/mva-manager/uploads_data:/app/uploads
    environment:
      NODE_ENV: production
      PORT: 3100
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/mva-manager
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      ALLOWED_EMAILS: ${ALLOWED_EMAILS}
      SERVER_URL: ${SERVER_URL}
      GEOCODIO_API_KEY: ${GEOCODIO_API_KEY}
      MAPBOX_TOKEN: ${MAPBOX_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:17
    container_name: mva-postgres
    # WHY: Bind to Tailscale IP so only Tailscale peers can reach postgres.
    # Docker port mappings bypass UFW, so 0.0.0.0 would be publicly accessible.
    ports:
      - "${TAILSCALE_IP}:5432:5432"
    volumes:
      - /mnt/yto-c528effc6f9d49/mva-manager/postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: mva-manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

